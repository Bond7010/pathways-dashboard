<meta charset="UTF-8">

<title>My Pathways Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Source+Sans+Pro:wght@400;600&display=swap">
<style>
  :root {
    --maroon: #772432;
    --blue:   #004165;
    --gray:   #A9B2B1;
    --yellow: #F2DF74;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Source Sans Pro', sans-serif;
    background: #F5F5F5;
    margin: 0;
    padding: 0;
  }
  header {
    background: var(--maroon);
    padding: 1rem 1.5rem;
  }
  header h1 {
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    margin: 0;
    font-size: 1.6rem;
    font-weight: 700;
  }
  main { padding: 1.5rem 1rem; }
  h2 {
    font-family: 'Montserrat', sans-serif;
    color: var(--blue);
    border-bottom: 2px solid var(--gray);
    padding-bottom: 0.25rem;
    font-size: 1.15rem;
    font-weight: 600;
    margin-top: 2rem;
  }
  #paths-scroll {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding-bottom: 1rem;
  }
  .path-col {
    flex: 0 0 300px;
    background: #fff;
    border: 1px solid var(--gray);
    border-radius: 6px;
    padding: 1rem;
  }
  .path-header {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
    margin-bottom: 0.2rem;
  }
  .path-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--blue);
    flex: 1;
  }
  .path-badge {
    font-size: 0.7rem;
    padding: 0.15rem 0.45rem;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .path-badge.completed  { background: var(--maroon); color: #fff; }
  .path-badge.in-progress { background: var(--yellow); color: #333; }
  .path-type-label {
    font-size: 0.7rem;
    color: #888;
    margin-bottom: 0.25rem;
  }
  .path-completion-date {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 0.75rem;
  }
  .level-section {
    border-top: 1px solid #eee;
    padding-top: 0.5rem;
    margin-top: 0.5rem;
  }
  .level-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--blue);
    margin: 0 0 0.4rem;
  }
  .project-list {
    list-style: none;
    margin: 0 0 0.4rem;
    padding: 0;
  }
  .project-item {
    display: flex;
    align-items: flex-start;
    gap: 0.4rem;
    margin-bottom: 0.25rem;
    font-size: 0.82rem;
  }
  .project-name { flex: 1; }
  .status-pill {
    font-size: 0.68rem;
    padding: 0.1rem 0.35rem;
    border-radius: 999px;
    border: 1px solid var(--gray);
    background: #f5f5f5;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    flex-shrink: 0;
  }
  .status-pill.complete    { background: #d4edda; border-color: #28a745; color: #155724; }
  .status-pill.in-progress { background: #fff3cd; border-color: #e0a800; color: #7a5c00; }
  .meta-line {
    font-size: 0.72rem;
    color: #555;
    margin-top: 0.25rem;
    line-height: 1.4;
  }
  .meta-line strong { color: var(--blue); }
  .meta-line.ed { }
  .meta-line.ed strong { color: var(--maroon); }
  .path-completion-row {
    border-top: 1px solid #eee;
    padding-top: 0.5rem;
    margin-top: 0.75rem;
  }
  #achievements-section { max-width: 600px; }
  .achievement-list { list-style: none; margin: 0; padding: 0; }
  .achievement-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid #eee;
    font-size: 0.9rem;
  }
  .achievement-name { flex: 1; }
  .achievement-badge {
    font-size: 0.72rem;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    background: #d4edda;
    border: 1px solid #28a745;
    color: #155724;
  }
</style>

// ---- Storage ----

let store = {};

function loadStore() {
  const raw = localStorage.getItem(STORAGE_KEY);
  store = raw ? JSON.parse(raw) : {};
}

function saveStore() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
}

function getStatus(key, defaultStatus) {
  return store[key] !== undefined ? store[key] : defaultStatus;
}

function cycleStatus(current) {
  const order = ['—', 'In Progress', 'Complete'];
  const idx = order.indexOf(current);
  return order[(idx + 1) % order.length];
}

function pillClass(status) {
  if (status === 'Complete') return 'status-pill complete';
  if (status === 'In Progress') return 'status-pill in-progress';
  return 'status-pill';
}

// ---- Rendering ----

function renderPill(key, defaultStatus) {
  const status = getStatus(key, defaultStatus);
  return `<span class="${pillClass(status)}" data-key="${key}" data-default="${defaultStatus}">${status}</span>`;
}

function renderLevel(pathId, levelIdx, level, defaultStatus) {
  let html = `<div class="level-section">`;
  html += `<p class="level-name">${level.name}</p>`;
  html += `<ul class="project-list">`;

  level.required.forEach((proj, pIdx) => {
    const key = `${pathId}.L${levelIdx}.req.${pIdx}`;
    html += `<li class="project-item">
      <span class="project-name">${proj}</span>
      ${renderPill(key, defaultStatus)}
    </li>`;
  });

  for (let e = 0; e < level.electives; e++) {
    const key = `${pathId}.L${levelIdx}.elec.${e}`;
    const label = level.electives > 1 ? `Elective ${e + 1} (choose ${level.electives})` : `Elective (choose 1)`;
    html += `<li class="project-item">
      <span class="project-name">${label}</span>
      ${renderPill(key, defaultStatus)}
    </li>`;
  }

  html += `</ul>`;

  if (level.meetingRoles) {
    html += `<p class="meta-line"><strong>Meeting roles:</strong> ${level.meetingRoles}</p>`;
  }
  if (level.edSeries) {
    html += `<p class="meta-line ed"><strong>Ed Series:</strong> ${level.edSeries}</p>`;
  }

  html += `</div>`;
  return html;
}

function renderPath(path) {
  const isCompleted = path.defaultStatus === 'Complete';
  const badgeClass = isCompleted ? 'completed' : 'in-progress';
  const badgeText = isCompleted ? 'Completed' : 'In Progress';
  const typeLabel = path.type.charAt(0).toUpperCase() + path.type.slice(1) + ' path';

  let html = `<div class="path-col">`;
  html += `<div class="path-header">
    <span class="path-name">${path.name}</span>
    <span class="path-badge ${badgeClass}">${badgeText}</span>
  </div>`;
  html += `<p class="path-type-label">${typeLabel}</p>`;
  html += `<p class="path-completion-date">Completed: —</p>`;

  path.levels.forEach((level, lIdx) => {
    html += renderLevel(path.id, lIdx + 1, level, path.defaultStatus);
  });

  const compKey = `${path.id}.completion`;
  html += `<div class="path-completion-row">
    <div class="project-item">
      <span class="project-name"><strong>${path.completion}</strong></span>
      ${renderPill(compKey, path.defaultStatus)}
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

function renderAll() {
  const container = document.getElementById('paths-scroll');
  container.innerHTML = PATHS_DATA.map(renderPath).join('');

  container.addEventListener('click', function(e) {
    const pill = e.target.closest('.status-pill');
    if (!pill) return;
    const key = pill.dataset.key;
    const def = pill.dataset.default;
    const current = getStatus(key, def);
    const next = cycleStatus(current);
    store[key] = next;
    saveStore();
    pill.textContent = next;
    pill.className = pillClass(next);
  });
}

document.addEventListener('DOMContentLoaded', function() {
  loadStore();
  renderAll();
});
